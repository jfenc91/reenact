<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Test Page</title>
  <style>
    body { margin: 0; padding: 20px; font-family: sans-serif; height: 3000px; }
    #btn { padding: 10px 20px; margin: 10px 0; }
    #input { padding: 8px; width: 300px; margin: 10px 0; display: block; }
    #output { margin: 10px 0; min-height: 20px; }
  </style>
</head>
<body>
  <h1>Test Fixture</h1>
  <button id="btn">Click Me</button>
  <input id="input" type="text" placeholder="Type here">
  <div id="output"></div>
  <div style="height: 2000px; background: linear-gradient(to bottom, #eee, #999);"></div>
  <script>
    document.getElementById('btn').addEventListener('click', () => {
      document.getElementById('output').textContent = 'clicked';
    });
    document.getElementById('btn').addEventListener('dblclick', () => {
      document.getElementById('output').textContent = 'double-clicked';
    });
    document.getElementById('btn').addEventListener('contextmenu', (e) => {
      e.preventDefault();
      document.getElementById('output').textContent = 'right-clicked';
    });
  </script>
</body>
</html>
